version: "3.9"

services:
  autoposter:
    build: .
    container_name: autoposter
    restart: unless-stopped
    env_file: .env
    ports:
      - "5000:5000"   # Web UI
      - "6080:6080"   # noVNC (встроенный браузер)
    volumes:
      - ./data:/app/data   # сессии, БД, медиа — персистентны
    shm_size: "1gb"        # нужно для Chromium
    init: true             # tini как PID 1 — убирает зомби-процессы
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
